<div
  class="pointer-events-none fixed inset-x-0 top-4 z-[100] flex flex-col items-center gap-2 px-4 sm:left-auto sm:right-4 sm:items-end"
>
  @for (toast of toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex w-full max-w-sm items-start gap-3 rounded-2xl border px-4 py-3 shadow-lg backdrop-blur-sm"
      [class]="toastClasses(toast.type)"
    >
      <span class="mt-0.5 text-lg leading-none">{{ toastIcon(toast.type) }}</span>
      <p class="flex-1 text-sm font-medium">{{ toast.message }}</p>
      <button
        type="button"
        class="rounded-full p-1 opacity-60 transition-opacity hover:opacity-100"
        (click)="dismiss(toast.id)"
        aria-label="Fermer la notification"
      >
        ✕
      </button>
    </div>
  }
</div>

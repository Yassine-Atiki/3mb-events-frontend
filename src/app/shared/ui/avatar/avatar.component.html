@if (url(); as src) {
  <img
    [src]="src"
    [alt]="name() ?? 'Avatar'"
    class="inline-block rounded-full object-cover"
    [class]="sizeClasses()"
  />
} @else {
  <span
    class="inline-flex items-center justify-center rounded-full bg-brand-teal/15 font-semibold text-brand-teal-dark"
    [class]="sizeClasses()"
  >
    {{ initials() }}
  </span>
}
